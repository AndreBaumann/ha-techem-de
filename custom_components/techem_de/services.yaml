import_history:
  name: Verbrauchshistorie importieren
  description: >
    Importiert alle bei Techem verfügbaren historischen Monatsverbrauchsdaten
    (bis zu 36 Monate) in die Home Assistant Langzeitstatistik.
    Die Daten erscheinen danach im Energie-Dashboard.
    Dieser Service muss nur einmalig aufgerufen werden.

clear_history:
  name: Verbrauchshistorie löschen
  description: >
    Löscht alle importierten Langzeitstatistik-Daten der
    Techem Energieverbrauch Dashboard-Entitäten.
