import_history:
  name: Verbrauchshistorie importieren
  description: >
    Importiert die historischen Monatsverbrauchsdaten (bis zu 26 Monate)
    aus dem Techem Mieterportal in die Home Assistant Langzeitstatistik.
    Die Daten erscheinen danach im Energie-Dashboard.
    Dieser Service muss nur einmalig aufgerufen werden.
